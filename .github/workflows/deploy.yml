name: Deploy docs to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: npm ci
      - run: npm run build # widget dist/widget.js (embedded into widget state on execute)

      # Install the package + a kernel so the example notebooks can be executed.
      # numpy is needed by the Chart examples (it's an optional extra); nbformat
      # for the doc generator.
      # lonboard + geopandas (+ pyarrow for geopandas->arrow) power the lonboard
      # interop example.
      - run: pip install -e ".[numpy,lonboard]" ipykernel nbconvert nbformat geopandas pyarrow
      - run: python -m ipykernel install --user --name manywidgets-venv

      # Generate the per-widget doc notebooks from each widget's co-located
      # doc.md (+ auto API table from trait introspection). These are build
      # artifacts (gitignored), so generate them here before executing.
      - name: Generate widget doc notebooks
        run: npm run docs:gen

      # Re-execute the example + per-widget notebooks so the captured widget state
      # (incl. the built _esm) is current. nbclient stores widget state into
      # metadata.widgets, which the static-export plugin needs to render widgets.
      - name: Pre-execute notebooks
        run: jupyter nbconvert --to notebook --execute --inplace docs/examples/*.ipynb docs/widgets/*.ipynb

      - uses: actions/configure-pages@v5

      # docs/myst.yml references the static-export plugin by release URL, so myst
      # fetches it at build time — no code dependency on the plugin in this repo.
      - name: Build MyST site
        working-directory: docs
        run: npx myst build --html
        env:
          BASE_URL: /manywidgets

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
